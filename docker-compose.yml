version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spectra_indexer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  indexer:
    build: .
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/spectra_indexer?schema=public"
    depends_on:
      - db

volumes:
  postgres_data:
